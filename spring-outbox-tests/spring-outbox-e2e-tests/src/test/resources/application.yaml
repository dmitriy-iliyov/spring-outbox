spring:
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        generate_statistics: true
        format_sql: true
logging:
  level:
    io.github.dmitriyiliyov.springoutbox: DEBUG
outbox:
  thread-pool-size: 2
  publisher:
    sender:
      type: kafka
    events:
      business-event:
        topic: business-event