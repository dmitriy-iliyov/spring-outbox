name: E2E Tests

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      outbox-version:
        description: "Library version to test against (leave empty to use the module default)"
        required: false
        type: string

jobs:

  kafka-postgres-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Resolve library version
        id: resolve
        run: |
          version="${{ github.event.inputs.outbox-version }}"
          if [ -z "$version" ] && [ -n "${{ github.event.release.tag_name }}" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          fi
          if [ -n "$version" ]; then
            echo "arg=-Doutbox.version=$version" >> "$GITHUB_OUTPUT"
            echo "Running E2E against library version $version"
          else
            echo "arg=" >> "$GITHUB_OUTPUT"
            echo "Running E2E against the module default library version"
          fi

      - name: Run Kafka + Postgres E2E
        working-directory: ./spring-outbox-tests/spring-outbox-e2e-tests
        run: mvn -B verify -Ddb=postgres ${{ steps.resolve.outputs.arg }}
