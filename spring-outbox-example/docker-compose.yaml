name: spring-outbox-example
services:

  outbox-producer-app:
    container_name: outbox-producer-app
    build:
      context: ..
      dockerfile: ./spring-outbox-example/spring-outbox-producer-example/Dockerfile
    image: outbox-producer-app
    environment:
      SPRING_PROFILES_ACTIVE: ${COMPOSE_PROFILES}
    ports:
      - "8080:8080"

  outbox-producer-postgresql:
    container_name: outbox-producer-postgresql
    image: postgres:18-alpine
    profiles: [ "postgres" ]
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: outbox_example
    ports:
      - "5432:5432"

  outbox-producer-mysql:
    container_name: outbox-producer-mysql
    image: mysql:8.0.1
    profiles: [ "mysql" ]
    networks:
      - default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: outbox_example
    ports:
      - "3306:3306"

  outbox-producer-oracle:
    container_name: outbox-producer-oracle
    image: gvenzl/oracle-free:23
    profiles: [ "oracle" ]
    networks:
      - default
    environment:
      ORACLE_PASSWORD: root
      APP_USER: admin
      ORACLE_DATABASE: outbox_example
      APP_USER_PASSWORD: root
    ports:
      - "1521:1521"

  outbox-consumer-app:
    container_name: outbox-consumer-app
    build:
      context: ..
      dockerfile: ./spring-outbox-example/spring-outbox-consumer-example/Dockerfile
    image: outbox-consumer-app
    depends_on:
      - outbox-consumer-redis
    environment:
      SPRING_PROFILES_ACTIVE: ${COMPOSE_PROFILES}
    ports:
      - "8081:8080"

  outbox-consumer-postgresql:
    container_name: outbox-consumer-postgresql
    image: postgres:18-alpine
    profiles: [ "postgres" ]
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: outbox_example
    ports:
      - "5433:5432"

  outbox-consumer-mysql:
    container_name: outbox-consumer-mysql
    image: mysql:8.0.1
    profiles: [ "mysql" ]
    networks:
      - default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: outbox_example
    ports:
      - "3307:3306"

  outbox-consumer-oracle:
    container_name: outbox-consumer-oracle
    image: gvenzl/oracle-free:23
    profiles: [ "oracle" ]
    networks:
      - default
    environment:
      ORACLE_PASSWORD: root
      APP_USER: admin
      ORACLE_DATABASE: outbox_example
      APP_USER_PASSWORD: root

    ports:
      - "1522:1521"

  outbox-consumer-redis:
    container_name: outbox-consumer-redis
    image: redis
    networks:
      - default
    ports:
      - "6379:6379"

  outbox-traffic-generator-app:
    container_name: outbox-traffic-generator-app
    build:
      context: ..
      dockerfile: ./spring-outbox-example/spring-outbox-traffic-generator/Dockerfile
    image: outbox-traffic-generator-app
    profiles: [ "test" ]
    depends_on:
      - outbox-producer-app
      - outbox-consumer-app
    ports:
      - "8082:8080"

  outbox-kafka:
    container_name: outbox-kafka
    image: apache/kafka:3.9.0
    profiles: [ "kafka" ]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://outbox-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  outbox-rabbitmq:
    container_name: outbox-rabbitmq
    image: rabbitmq:3-management
    profiles: [ "rabbitmq" ]
    ports:
      - "5672:5672"
      - "15672:15672"

  outbox-prometheus:
    container_name: outbox-prometheus
    image: prom/prometheus:latest
    profiles: [ "test" ]
    depends_on:
      - outbox-producer-app
      - outbox-consumer-app
    networks:
      - default
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  outbox-grafana:
    container_name: outbox-grafana
    image: grafana/grafana:latest
    profiles: [ "test" ]
    depends_on:
      - outbox-prometheus
    networks:
      - default
    ports:
      - "3000:3000"

volumes:
  kafka_data: {}
