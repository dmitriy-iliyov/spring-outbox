spring:
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        generate_statistics: true
        format_sql: true
    hibernate:
      ddl-auto: none
  kafka:
    listener:
      ack-mode: manual
logging:
  level:
    io.github.dmitriyiliyov.oncebox: DEBUG
oncebox:
  thread-pool-size: 2
  publisher:
    enabled: false
  consumer:
    enabled: true
    mappings:
      test-business-event: io.github.dmitriyiliyov.oncebox.tests.integration.domain.BusinessEvent
    cache:
      enabled: false
    metrics:
      enabled: true