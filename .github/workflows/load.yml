name: Load Tests

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-lib-and-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build lib
        run: mvn -B clean install -DskipTests=true -Dgpg.skip=true

      - name: Upload local Maven repo
        uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/io/github/dmitriy-iliyov
          retention-days: 1

  gatling-load-tests:
    runs-on: ubuntu-latest
    needs: build-lib-and-images
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, oracle]
    steps:
      - uses: actions/checkout@v4

      - name: Download local Maven repo
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/io/github/dmitriy-iliyov

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Start infrastructure
        working-directory: ./spring-outbox-tests/spring-outbox-load-tests
        run: COMPOSE_PROFILES=kafka,${{ matrix.db }} docker compose up -d --build

      - name: Wait for database to be ready
        run: |
          if [ "${{ matrix.db }}" == "oracle" ]; then
            DB_PORT=1521
            TIMEOUT=300
          elif [ "${{ matrix.db }}" == "mysql" ]; then
            DB_PORT=3306
            TIMEOUT=180
          else
            DB_PORT=5432
            TIMEOUT=180
          fi
          echo "Waiting for ${{ matrix.db }} on port $DB_PORT..."
          timeout $TIMEOUT bash -c "until nc -z localhost $DB_PORT; do sleep 5; done"
          echo "Database port is open, waiting extra 10s for full initialization..."
          sleep 10

      - name: Show container logs
        if: always()
        working-directory: ./spring-outbox-tests/spring-outbox-load-tests
        run: docker compose logs --tail=300

      - name: Wait for application to be ready
        run: |
          if [ "${{ matrix.db }}" == "oracle" ]; then
            TIMEOUT=180
          else
            TIMEOUT=120
          fi
          echo "Waiting for producer app..."
          timeout $TIMEOUT bash -c 'until curl -sf http://localhost:8080/actuator/health | grep -q "UP"; do sleep 5; done'

      - name: Show container logs on failure
        if: failure()
        working-directory: ./spring-outbox-tests/spring-outbox-load-tests
        run: docker compose logs --tail=300

      - name: Run Gatling Load Tests
        working-directory: ./spring-outbox-tests/spring-outbox-load-tests
        run: mvn gatling:test

      - name: Upload Gatling Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatling-report-${{ matrix.db }}
          path: ${{ github.workspace }}/spring-outbox-tests/spring-outbox-load-tests/target/gatling/
          retention-days: 7

      - name: Stop infrastructure
        if: always()
        working-directory: ./spring-outbox-tests/spring-outbox-load-tests
        run: COMPOSE_PROFILES=kafka,${{ matrix.db }} docker compose down -v