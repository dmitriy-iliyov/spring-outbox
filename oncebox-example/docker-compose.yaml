name: oncebox-example
services:

  oncebox-producer-app:
    container_name: oncebox-producer-app
    build:
      context: ..
      dockerfile: ./oncebox-example/oncebox-producer-example/Dockerfile
    image: oncebox-producer-app
    environment:
      SPRING_PROFILES_ACTIVE: ${COMPOSE_PROFILES}
    ports:
      - "8080:8080"

  oncebox-producer-postgresql:
    container_name: oncebox-producer-postgresql
    image: postgres:18-alpine
    profiles: [ "postgres" ]
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: oncebox_example
    ports:
      - "5432:5432"

  oncebox-producer-mysql:
    container_name: oncebox-producer-mysql
    image: mysql:8.0.1
    profiles: [ "mysql" ]
    networks:
      - default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: oncebox_example
    ports:
      - "3306:3306"

  oncebox-producer-oracle:
    container_name: oncebox-producer-oracle
    image: gvenzl/oracle-free:23
    profiles: [ "oracle" ]
    networks:
      - default
    environment:
      ORACLE_PASSWORD: root
      APP_USER: admin
      ORACLE_DATABASE: oncebox_example
      APP_USER_PASSWORD: root
    ports:
      - "1521:1521"

  oncebox-consumer-app:
    container_name: oncebox-consumer-app
    build:
      context: ..
      dockerfile: ./oncebox-example/oncebox-consumer-example/Dockerfile
    image: oncebox-consumer-app
    depends_on:
      - oncebox-consumer-redis
    environment:
      SPRING_PROFILES_ACTIVE: ${COMPOSE_PROFILES}
    ports:
      - "8081:8080"

  oncebox-consumer-postgresql:
    container_name: oncebox-consumer-postgresql
    image: postgres:18-alpine
    profiles: [ "postgres" ]
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: oncebox_example
    ports:
      - "5433:5432"

  oncebox-consumer-mysql:
    container_name: oncebox-consumer-mysql
    image: mysql:8.0.1
    profiles: [ "mysql" ]
    networks:
      - default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: oncebox_example
    ports:
      - "3307:3306"

  oncebox-consumer-oracle:
    container_name: oncebox-consumer-oracle
    image: gvenzl/oracle-free:23
    profiles: [ "oracle" ]
    networks:
      - default
    environment:
      ORACLE_PASSWORD: root
      APP_USER: admin
      ORACLE_DATABASE: oncebox_example
      APP_USER_PASSWORD: root

    ports:
      - "1522:1521"

  oncebox-consumer-redis:
    container_name: oncebox-consumer-redis
    image: redis
    networks:
      - default
    ports:
      - "6379:6379"

  oncebox-traffic-generator-app:
    container_name: oncebox-traffic-generator-app
    build:
      context: ..
      dockerfile: ./oncebox-example/oncebox-traffic-generator/Dockerfile
    image: oncebox-traffic-generator-app
    profiles: [ "test" ]
    depends_on:
      - oncebox-producer-app
      - oncebox-consumer-app
    ports:
      - "8082:8080"

  oncebox-kafka:
    container_name: oncebox-kafka
    image: apache/kafka:3.9.0
    profiles: [ "kafka" ]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://oncebox-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  oncebox-rabbit:
    container_name: oncebox-rabbit
    image: rabbitmq:3-management
    profiles: [ "rabbit" ]
    ports:
      - "5672:5672"
      - "15672:15672"

  oncebox-prometheus:
    container_name: oncebox-prometheus
    image: prom/prometheus:latest
    profiles: [ "test" ]
    depends_on:
      - oncebox-producer-app
      - oncebox-consumer-app
    networks:
      - default
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  oncebox-grafana:
    container_name: oncebox-grafana
    image: grafana/grafana:latest
    profiles: [ "test" ]
    depends_on:
      - oncebox-prometheus
    networks:
      - default
    ports:
      - "3000:3000"

volumes:
  kafka_data: {}
