name: spring-outbox-load-tests
services:

  outbox-producer-app:
    container_name: outbox-producer-app
    build:
      context: ../..
      dockerfile: ./spring-outbox-example/spring-outbox-producer-example/Dockerfile
    image: outbox-producer-app
    environment:
      SPRING_PROFILES_ACTIVE: ${COMPOSE_PROFILES}
    ports:
      - "8080:8080"
    depends_on:
      outbox-producer-postgresql:
        condition: service_healthy
        required: false
      outbox-producer-mysql:
        condition: service_healthy
        required: false
      outbox-producer-oracle:
        condition: service_healthy
        required: false

  outbox-producer-postgresql:
    container_name: outbox-producer-postgresql
    image: postgres:18-alpine
    profiles: [ "postgres" ]
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: outbox_example
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d outbox_example" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  outbox-producer-mysql:
    container_name: outbox-producer-mysql
    image: mysql:8.0.1
    profiles: [ "mysql" ]
    networks:
      - default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: outbox_example
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  outbox-producer-oracle:
    container_name: outbox-producer-oracle
    image: gvenzl/oracle-free:23
    profiles: [ "oracle" ]
    networks:
      - default
    environment:
      ORACLE_PASSWORD: root
      APP_USER: admin
      ORACLE_DATABASE: outbox_example
      APP_USER_PASSWORD: root
    ports:
      - "1521:1521"
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  pg_data: