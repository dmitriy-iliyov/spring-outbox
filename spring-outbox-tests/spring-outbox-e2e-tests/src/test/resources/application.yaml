logging:
  level:
    io.github.dmitriyiliyov.springoutbox: DEBUG

# Aggressive timings: e2e scenarios simulate time passage by shifting row timestamps,
# so polling delays and initial delays are kept near-minimal for fast, deterministic tests.
# Broker-specific settings (sender/consumer type, connection) live in application-{kafka,rabbit}.yaml.
outbox:
  thread-pool-size: 9
  tables:
    auto-create: true

  publisher:
    sender:
      emergency-timeout: 10s

    defaults:
      batch-size: 100
      polling:
        type: fixed
        initial-delay: 1s
        fixed-delay: 500ms
      max-retries: 2
      backoff:
        enabled: true
        delay: 1s
        multiplier: 2.0

    events:
      e2e-event:
        topic: e2e.events
      e2e-aop-event:
        topic: e2e.events
      # High retry budget with constant backoff: the broker-recovery test must keep retrying through the
      # whole outage without exhausting to the DLQ. On Rabbit a downed broker fails instantly (connection
      # refused), so a small fixed max-retries would burn out before the broker restarts; a constant backoff
      # also keeps post-recovery delivery prompt instead of drifting far into the future.
      e2e-retry-event:
        topic: e2e.events
        max-retries: 100
        backoff:
          delay: 500ms
          multiplier: 1.0
      e2e-dlq-event:
        topic: e2e.events
        max-retries: 1
        backoff:
          delay: 500ms
          multiplier: 2.0

    stuck-recovery:
      batch-size: 100
      max-batch-processing-time: 3s
      polling:
        type: fixed
        initial-delay: 1s
        fixed-delay: 500ms

    clean-up:
      enabled: true
      batch-size: 100
      ttl: 30s
      polling:
        type: fixed
        initial-delay: 1s
        fixed-delay: 500ms

    dlq:
      enabled: true
      batch-size: 100
      polling:
        type: fixed
        initial-delay: 1s
        fixed-delay: 500ms
      clean-up:
        enabled: true
        batch-size: 100
        ttl: 30s
        polling:
          type: fixed
          initial-delay: 1s
          fixed-delay: 500ms

  consumer:
    enabled: true
    mappings:
      e2e-event: io.github.dmitriyiliyov.springoutbox.tests.e2e.domain.BusinessEvent
      e2e-aop-event: io.github.dmitriyiliyov.springoutbox.tests.e2e.domain.BusinessEvent
      e2e-retry-event: io.github.dmitriyiliyov.springoutbox.tests.e2e.domain.BusinessEvent
      e2e-dlq-event: io.github.dmitriyiliyov.springoutbox.tests.e2e.domain.BusinessEvent
    cache:
      enabled: false
    clean-up:
      enabled: true
      batch-size: 100
      ttl: 30s
      polling:
        type: fixed
        initial-delay: 1s
        fixed-delay: 500ms
