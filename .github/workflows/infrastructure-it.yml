name: Infrastructure IT

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  build-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn -B clean install -DskipTests=true -Dgpg.skip=true

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .
          retention-days: 1

  outbox-tests:
    runs-on: ubuntu-latest
    needs: build-lib
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, oracle]
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run OUTBOX integration tests
        working-directory: ./spring-outbox-tests/spring-outbox-integration-tests
        run: mvn -B verify -Dgpg.skip=true -Dtest.groups=outbox -Dspring.profiles.active=outbox -Ddb=${{ matrix.db }}

  kafka-inbox-tests:
    runs-on: ubuntu-latest
    needs: build-lib
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, oracle]
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run INBOX integration tests
        working-directory: ./spring-outbox-tests/spring-outbox-integration-tests
        run: mvn -B verify -Dgpg.skip=true -Dtest.groups=kafka-inbox -Dspring.profiles.active=inbox -Ddb=${{ matrix.db }}

  rabbit-inbox-tests:
    runs-on: ubuntu-latest
    needs: build-lib
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, oracle]
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
          path: .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run INBOX integration tests
        working-directory: ./spring-outbox-tests/spring-outbox-integration-tests
        run: mvn -B verify -Dgpg.skip=true -Dtest.groups=rabbit-inbox -Dspring.profiles.active=inbox -Ddb=${{ matrix.db }}