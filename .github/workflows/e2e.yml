name: E2E

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      outbox-version:
        description: "Library version to test (leave empty to build and test the current source)"
        required: false
        type: string

jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install library to local Maven repo
        run: mvn -B clean install -Dgpg.skip=true

      - name: Read library version
        id: version
        run: echo "value=$(grep -m1 '<version>' pom.xml | sed -E 's#.*<version>(.*)</version>.*#\1#')" >> "$GITHUB_OUTPUT"

      - name: Upload local Maven repo
        uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/io/github/dmitriy-iliyov
          retention-days: 1

  e2e:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, oracle]
        broker: [kafka, rabbit]
    name: ${{ matrix.broker }} + ${{ matrix.db }} E2E
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download local Maven repo
        uses: actions/download-artifact@v4
        with:
          name: maven-repo
          path: ~/.m2/repository/io/github/dmitriy-iliyov

      - name: Resolve library version
        id: resolve
        run: |
          version="${{ github.event.inputs.outbox-version }}"
          if [ -z "$version" ]; then
            version="${{ needs.build.outputs.version }}"
            echo "Running E2E against the just-built source (version $version)"
          else
            echo "Running E2E against already-published library version $version"
          fi
          echo "arg=-Doncebox.version=$version" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.broker }} + ${{ matrix.db }} E2E
        working-directory: ./oncebox-tests/oncebox-e2e-tests
        run: mvn -B verify -Ddb=${{ matrix.db }} -Dbroker=${{ matrix.broker }} ${{ steps.resolve.outputs.arg }}
